name: Deploy frontend to allansjoelin.com/stocky

# Builds the Vite/React app and uploads the static output to the shared host
# (Apache) via FTPS, into the /stocky subfolder of the web root. The site is
# then served at https://www.allansjoelin.com/stocky/.
#
# Required repo SECRETS (Settings → Secrets and variables → Actions → Secrets):
#   FTP_SERVER     host of your FTP server (e.g. ftp.allansjoelin.com)
#   FTP_USERNAME   FTP login
#   FTP_PASSWORD   FTP password
# Required repo VARIABLES (same page → Variables tab — these aren't secret):
#   FTP_SERVER_DIR target dir on the host, MUST end in stocky/ (e.g. /public_html/stocky/)
#   VITE_API_BASE  backend URL (leave unset until the backend host exists; app
#                  can't reach data until it's set and this workflow re-run)

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch: {}

concurrency:
  group: deploy-frontend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Guard against syncing over the whole site
        # FTP-Deploy-Action mirrors local-dir onto server-dir and prunes remote
        # files that aren't local. If server-dir were the web root that would
        # wipe the existing site, so refuse anything not scoped to /stocky/.
        run: |
          dir="${{ vars.FTP_SERVER_DIR }}"
          if [ -z "$dir" ]; then
            echo "::error::Set the FTP_SERVER_DIR repo variable to your stocky subfolder (e.g. /public_html/stocky/)"; exit 1
          fi
          case "$dir" in
            */stocky/) : ;;
            *) echo "::error::FTP_SERVER_DIR must end in 'stocky/' to avoid overwriting your site. Got: $dir"; exit 1 ;;
          esac

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          VITE_BASE: /stocky/
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}
        run: npm run build

      - name: Upload to shared host via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: frontend/dist/
          server-dir: ${{ vars.FTP_SERVER_DIR }}
