name: Deploy frontend to GitHub Pages

# Builds the Vite/React app in frontend/ and publishes it to GitHub Pages.
# No secrets required — Pages deploys via the built-in GITHUB_TOKEN + OIDC.
#
# The backend host is not decided yet. Until it is, set the GitHub Actions
# *variable* VITE_API_BASE (repo Settings → Secrets and variables → Actions →
# Variables) to your backend URL and re-run this workflow; the build inlines it.
# It's a public URL, so it's a variable, not a secret.

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch: {}

# Least-privilege permissions the Pages deploy action needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; newer pushes supersede in-flight ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Build
        env:
          # Project site lives under /<repo>/ — keep in sync with the repo name.
          VITE_BASE: /stocky/
          # Backend URL (empty until the backend host is chosen). Falls back to
          # localhost in api.ts, so the deployed app won't reach a backend until
          # this variable is set and the workflow re-run.
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}
        run: npm run build

      - name: SPA fallback for client-side routes
        # GitHub Pages has no SPA rewrite; serving index.html as 404.html lets
        # deep links / refreshes (e.g. /stocky/portfolio) boot the app.
        run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
